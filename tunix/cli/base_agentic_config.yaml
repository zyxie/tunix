################################## LOAD MODEL ##################################
model_config: &base_model_config
  # The unique full name identifier of the model.
  # Can be the Huggingface model name, e.g., "gemma-2b", "llama-3.1-8b", or
  # Tunix standard format, e.g., "gemma2_2b_it", "llama3p1_8b".
  model_name: "llama-3.1-8b"

  # Change model source to your downloading model workflow. Supported sources: "kaggle" | "huggingface" | "gcs" | "internal" | "maxtext"
  model_source: "huggingface"

  # Model identifier used by Tunix to determine model architecture and configuration.
  # Can be a HuggingFace Hub model ID (e.g., "google/gemma-2-2b-it", "meta-llama/Llama-3.1-8B")
  # or a Tunix native model config ID (e.g., "gemma2_2b_it", "llama3p1_8b").
  # If model_source is "huggingface", this ID is used to download model from HuggingFace Hub.
  model_id: "meta-llama/Llama-3.1-8B"

  # Path or identifier for model source.
  # If model_source is Kaggle, this is Kaggle Hub model identifier (e.g. "google/gemma-2/flax/gemma2-2b-it").
  # If model_source is GCS or internal, this is the GCS/CNS path to model files.
  # If model_source is Maxtext, this is the checkpoint path.
  # If model_source is huggingface, this field is ignored. Model files are downloaded from Hugging Face Hub
  # using model_id and stored in model_download_path.
  model_path: ""

  ################################## Checkpoint ##################################
  # for model downloaded from huggingface or kaggle, copy model to local directory.
  model_download_path: "/tmp/models"

  ################################## KAGGLE ##################################
  # If download checkpoint from kaggle, specify your kaggle credentials `KAGGLE_USERNAME` and `KAGGLE_KEY ` in envrionment variable.

  ################################## HF ##################################
  # If download checkpoint from huggingface, specifcy your hf credentials `HF_TOKEN` in environnebt variable.

  ################################## NNX ##################################
  # Integer seed to create `nnx.Rngs` to manage the random state.

  ################################## MAXTEXT ##################################
  # Optional keyword arguments passed to the underlying model architecture.
  # When using `model_source: "maxtext"`, you can safely pass MaxText-specific
  # configuration overrides under `kwargs`. Tunix will automatically forward valid
  # configuration fields (e.g., `base_emb_dim`, `sparse_matmul`, etc.) to the
  # MaxText initializer without conflicts.
  #
  # Note on Hugging Face token: Maxtext can download models automatically from
  # Hugging Face if no `model_path` is given. By default, it uses the `HF_TOKEN`
  # environment variable. You can also explicitly specify it here:
  # kwargs:
  #   hf_access_token: "your_token"
  #   base_emb_dim: 4096
  #   sparse_matmul: true
  #   remat_policy: "minimal"

  rng_seed: 0

  # Display model
  model_display: false

  # Directory used for NNX conversion if downloaded Gemma/Gemma2 from Kaggle source.
  intermediate_ckpt_dir: "/tmp/intermediate_ckpt/"

  # Flash Attention configuration
  use_flash_attention: false
  flash_attention_block_size: 1024
  ################################# LoRa #################################
  # If you want to use LoRa, specify the module_path, rank, and alpha. You can also optionally specify the weight_qtype and tile_size, e.g.:
  #lora_config:
  #  module_path: ".*q_einsum|.*kv_einsum|.*gate_proj|.*down_proj|.*up_proj"
  #  rank: 16
  #  alpha: 2.0
  #  weight_qtype: "nf4"
  #  tile_size: 256
  lora_config: {}

  ################################## MESH ##################################
  mesh:
    shape: "(2,2)"
    # "('fsdp',)"
    axis_names: "('fsdp','tp')"
    # Optional device allocation policy used when this mesh is carved from a
    # larger device pool. Supported values:
    #   COMPACT: pack into the smallest fitting remaining region.
    #   PERFORMANCE: prefer more cubical supported extracted shapes.
    # When omitted, Tunix defaults to COMPACT.
    allocation_policy: "COMPACT"

actor_model_config:
  <<: *base_model_config

reference_model_config:
 <<: *base_model_config

rollout_model_config:
 <<: *base_model_config

################################## Tokenizer ##################################
tokenizer_config:
  # Usually, `tokenizer_path` should be same as `model_id`, unless you load tokenizer from elsewhere.
  tokenizer_path: "meta-llama/Llama-3.1-8B"

  # Define `T_HF_TOKEN` to access tokenizer from huggingface
  tokenizer_type: "huggingface" # Currently supporting: "sentencepiece", "huggingface"

  add_bos: True

  add_eos: True



################################## DATASET ##################################
# Translation_dataset  "Helsinki-NLP/opus-100" or "mtnt/en-fr" for SFT
# Math_dataset "gsm8k" for grpo
data_source: ""
data_directory: ""
data_module: ""
# For agentic grpo cli, we apply template in chat parser, not in dataset.
apply_chat_template_to_dataset: false
data_config: {}
dataset_name: "Helsinki-NLP/opus-100"
batch_size: 16
prompt_key: "prompts"
max_target_length: 256
num_train_epochs: 1
train_fraction: 1.0
num_test_batches: 100
# Controls the download flag only when using TFDS datasets. If false, the
# data_dir used will be set to `None` and chosen by default by tfds.
tfds_download: True

# You could leave this as 0, and the num_batches will be auto calculated as
# floor(dataset_length / batch_size). Set to a positive integer to cap the
# number of batches used per epoch.
num_batches: 0

############################### Optimizer ###############################
# Optimizer config
optimizer_config: &base_optimizer_config
  learning_rate: 1e-5
  opt_type: "adamw"

  # == Optax Optimizer Scheduler ==
  # Belows are function parameters for optax optimizer scheduler. Make sure you specified the corresponding parameters for your schedule_type.

  schedule_type: "warmup_cosine_decay_schedule"
  value: 1e-5
  peak_value: 3e-5
  init_value: 0.0
  end_value: 0.0
  warmup_ratio: 0.1
  b1: 0.9
  b2: 0.99
  weight_decay: 0.1
  warmup_steps: 5
  decay_steps: 10
  # == Grad clipping ==
  # Grad clipping to prevent large gradients. Found this
  # important to keep KL divergence in check.
  max_grad_norm: 0.1


############################### Training Config ###############################
training_config: &base_training_config
  eval_every_n_steps: 2
  max_steps: 10
  gradient_accumulation_steps: 1
  checkpoint_root_directory: "/tmp/ckpts"
  checkpointing_options:
    max_to_keep: 1
    save_interval_steps: 180
  metrics_logging_options:
    project_name: "tunix"
    run_name: ""
    log_dir: "/tmp/logging"
    flush_every_n_steps: 20
  # === Perf metrics options ===
  # Currently only supported for grpo_main. Configs you can specify are:
    # enable_perf_v1 = whether to enable perf metrics v1 (default: true).
    # enable_perf_v2 = whether to enable perf metrics v2 (default: false).
    # custom_export_fn_path = the path to the custom export function for the v1 perf metrics.
    # custom_export_fn_path_v2 = the path to the custom export function for the v2 perf metrics (experimental).
    # enable_trace_writer = whether to enable writing out the trace for visualization (enabled by default).
    # trace_dir = the directory to save the trace files.
  perf_metrics_options: {}
  profiler_options:
    log_dir: "/tmp/profiling"
    skip_first_n_steps: 1
    profiler_steps: 9
  data_sharding_axis: ["fsdp"]
  max_inflight_computations: 2

rl_training_config:
  <<: *base_training_config
  actor_optimizer_config:
    <<: *base_optimizer_config

  critic_optimizer_config: null
############################### GRPO Config ###############################
grpo_config:
  # The number of times the policy generates multiple responses for a given prompt
  # within a single training step. This corresponds to `G` in Algorithm 1 in the
  # paper. The "group" in GRPO comes from here.
  num_generations: 2

  # The number of iterations per batch (𝜇 in GRPO algo 1).
  num_iterations: 1

  # The coefficient for the KL divergence penalty (𝛽) in the GRPO loss function.
  # Important to keep a high enough value for this, otherwise, the KL divergence
  # can increase unchecked.
  beta: 0.08

  # Epsilon value for clipping (𝜀 in GRPO loss in paper). Similar to PPO, for
  # stable updates.
  epsilon: 0.2


############################### Rollout Config ###############################
rollout_config:
  total_generation_steps: 768

  max_prompt_length: 256

  # Important to keep a high-ish temperature for varied, diverse responses during
  # training.
  temperature: 0.9

  top_p: 1.0

  top_k: 50


############################### Other RL  Config ###############################

rollout_engine: "vanilla"
sglang_jax_config: {}
vllm_config: {}

offload_to_cpu: false

training_mode: "grpo"

chat_parser_config:
  type: "default"

agent_class_path: null
agent_kwargs: {}
env_class_path: null
env_kwargs: {}
kubernetes_config: null

agentic_grpo_config: {}

 ############################# Reward Fns #############################

verl_compatible: false
reward_functions:
 - tunix/cli/reward_fn/gsm8k.py
